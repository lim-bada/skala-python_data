<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>일일 매출 리포트</title>
    <style>
      :root {
        color-scheme: light;
        --background: #f4f7fb;
        --surface: #ffffff;
        --primary: #1f4b99;
        --border: #dce3ed;
        --text: #172033;
        --muted: #68758a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--background);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(960px, calc(100% - 40px));
        margin: 48px auto;
      }

      header {
        margin-bottom: 28px;
      }

      h1 {
        margin: 0 0 8px;
        color: var(--primary);
        font-size: 2rem;
      }

      .generated-at {
        margin: 0;
        color: var(--muted);
      }

      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
        margin-bottom: 28px;
      }

      .kpi-card,
      .table-card {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        box-shadow: 0 4px 14px rgb(31 75 153 / 8%);
      }

      .kpi-card {
        padding: 22px;
      }

      .kpi-label {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .kpi-value {
        margin: 0;
        font-size: 1.55rem;
        font-weight: 700;
      }

      .table-card {
        overflow: hidden;
      }

      h2 {
        margin: 0;
        padding: 22px 24px;
        font-size: 1.2rem;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 14px 24px;
        border-top: 1px solid var(--border);
        text-align: left;
      }

      th {
        background: #f8faff;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .number {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .empty {
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 700px) {
        main {
          width: min(100% - 24px, 960px);
          margin: 28px auto;
        }

        .kpi-grid {
          grid-template-columns: 1fr;
        }

        th,
        td {
          padding: 12px 14px;
        }
      }
    </style>
  </head>
  <body>
    <!-- STEP 2: Python 집계 결과를 표현하는 Jinja2 HTML 템플릿 -->
    <main>
      <header>
        <h1>일일 매출 리포트</h1>
        <p class="generated-at">생성 시각: 2026-07-21 19:00:27 KST</p>
      </header>

      <section class="kpi-grid" aria-label="핵심 성과 지표">
        <article class="kpi-card">
          <p class="kpi-label">총매출</p>
          <p class="kpi-value">4,083,029,427.99원</p>
        </article>
        <article class="kpi-card">
          <p class="kpi-label">주문수</p>
          <p class="kpi-value">5,000건</p>
        </article>
        <article class="kpi-card">
          <p class="kpi-label">평균 주문액</p>
          <p class="kpi-value">816,605.9원</p>
        </article>
      </section>

      <section class="table-card">
        <h2>카테고리별 매출 TOP 5</h2>
        <table>
          <thead>
            <tr>
              <th scope="col">순위</th>
              <th scope="col">카테고리</th>
              <th scope="col" class="number">매출액</th>
            </tr>
          </thead>
          <tbody>
            
              <tr>
                <td>1</td>
                <td>Food</td>
                <td class="number">838,002,283.50원</td>
              </tr>
            
              <tr>
                <td>2</td>
                <td>Beauty</td>
                <td class="number">824,667,442.15원</td>
              </tr>
            
              <tr>
                <td>3</td>
                <td>Fashion</td>
                <td class="number">811,835,493.95원</td>
              </tr>
            
              <tr>
                <td>4</td>
                <td>Home</td>
                <td class="number">805,336,411.19원</td>
              </tr>
            
              <tr>
                <td>5</td>
                <td>Electronics</td>
                <td class="number">803,187,797.20원</td>
              </tr>
            
          </tbody>
        </table>
      </section>
    </main>
  </body>
</html>
